name: Deploy to ifestos

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo '[ifestos.cse.sc.edu]:222 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKf2PdyV7Cogvy0j4FzoO8M50/2VYgKnJ/WrrAXlHJkZ' >> ~/.ssh/known_hosts

      - name: Deploy files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 222" \
            --exclude '.git' \
            --exclude '.github' \
            ./ lee55@ifestos.cse.sc.edu:~/public_html/
